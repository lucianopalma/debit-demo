<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }

    .card h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .card p.subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #6366f1;
    }

    .amount-wrapper {
      position: relative;
    }

    .amount-wrapper span {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #6b7280;
      pointer-events: none;
    }

    .amount-wrapper input {
      padding-left: 40px;
    }

    .funding-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .funding-option {
      position: relative;
    }

    .funding-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .funding-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    .funding-option label .icon {
      font-size: 24px;
    }

    .funding-option input[type="radio"]:checked + label {
      border-color: #6366f1;
      background: #eef2ff;
      color: #4f46e5;
    }

    .funding-option label:hover {
      border-color: #a5b4fc;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn:hover { background: #4f46e5; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      color: #dc2626;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .notice {
      color: #92400e;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Faça seu pagamento</h1>
    <p class="subtitle">Informe o valor e selecione o tipo de cartao.</p>

    <form id="checkout-form">
      <div class="field">
        <label for="amount">Valor (BRL)</label>
        <div class="amount-wrapper">
          <span>R$</span>
          <input
            type="number"
            id="amount"
            name="amount"
            min="0.50"
            step="0.01"
            placeholder="0,00"
            required
          />
        </div>
      </div>

      <div class="field">
        <label>Tipo de cartao</label>
        <div class="funding-options">
          <div class="funding-option">
            <input type="radio" id="credit" name="fundingType" value="credit" required />
            <label for="credit">
              <span class="icon">💳</span>
              Credito
            </label>
          </div>
          <div class="funding-option">
            <input type="radio" id="debit" name="fundingType" value="debit" />
            <label for="debit">
              <span class="icon">🏦</span>
              Debito
            </label>
          </div>
        </div>
      </div>

      <button type="submit" class="btn" id="submit-btn">Continuar para pagamento</button>
      <p class="notice" id="notice-msg"></p>
      <p class="error" id="error-msg"></p>
    </form>
  </div>

  <script>
    const form = document.getElementById("checkout-form");
    const submitBtn = document.getElementById("submit-btn");
    const errorMsg = document.getElementById("error-msg");
    const noticeMsg = document.getElementById("notice-msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      let amount = parseFloat(document.getElementById("amount").value);
      const fundingType = document.querySelector('input[name="fundingType"]:checked')?.value;

      if (!amount || amount < 0.5) {
        showError("Por favor, insira um valor de pelo menos R$ 0,50.");
        return;
      }

      if (!fundingType) {
        showError("Por favor, selecione o tipo de cartao.");
        return;
      }

      /*
      if (amount > 2.00) {
        amount = 2.00;
        document.getElementById("amount").value = "2.00";
        showNotice("Obrigado por sua generosidade, mas o nosso cafe custa no maximo R$ 2,00");
      }
      */

      sessionStorage.setItem("amount", amount);
      sessionStorage.setItem("fundingType", fundingType);

      window.location.href = "/checkout.html";
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    function showNotice(msg) {
      noticeMsg.textContent = msg;
      noticeMsg.style.display = "block";
    }
  </script>
</body>
</html>
